<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게스트하우스 예약</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6f8;
      color: #222;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    header {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
    }

    .subtitle {
      margin-top: 8px;
      color: #777;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.4fr 0.8fr;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .calendar-header button,
    .submit-btn {
      border: none;
      background: #222;
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
    }

    .month-title {
      font-weight: 700;
      font-size: 20px;
    }

    .weekdays,
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .weekdays div {
      text-align: center;
      font-size: 13px;
      color: #777;
      padding-bottom: 6px;
    }

    .day {
      min-height: 92px;
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 8px;
      background: #fafafa;
      cursor: pointer;
      position: relative;
    }

    .day:hover {
      border-color: #222;
    }

    .day.disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .day.selected {
      background: #222;
      color: white;
    }

    .date-num {
      font-weight: 700;
      margin-bottom: 8px;
    }

    .room-status {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
    }

    .badge {
      padding: 3px 6px;
      border-radius: 999px;
      background: #e9f7ef;
      color: #1f7a3f;
    }

    .badge.booked {
      background: #ffeaea;
      color: #d93025;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin: 14px 0 6px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .summary {
      background: #f7f7f7;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      font-size: 14px;
      line-height: 1.7;
    }

    .submit-btn {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
    }

    .notice {
      margin-top: 12px;
      font-size: 13px;
      color: #777;
      line-height: 1.5;
    }

    @media (max-width: 800px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .day {
        min-height: 76px;
        padding: 6px;
      }

      .badge {
        font-size: 10px;
        padding: 2px 5px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header>
      <h1>게스트하우스 예약</h1>
      <div class="subtitle">달력에서 체크인 날짜와 체크아웃 날짜를 선택해주세요.</div>
    </header>

    <section class="layout">
      <div class="card">
        <div class="calendar-header">
          <button id="prevBtn">이전</button>
          <div class="month-title" id="monthTitle"></div>
          <button id="nextBtn">다음</button>
        </div>

        <div class="weekdays">
          <div>일</div>
          <div>월</div>
          <div>화</div>
          <div>수</div>
          <div>목</div>
          <div>금</div>
          <div>토</div>
        </div>

        <div class="calendar" id="calendar"></div>
      </div>

      <div class="card">
        <h2>예약 정보</h2>

        <div class="summary">
          체크인: <strong id="checkInText">선택 전</strong><br />
          체크아웃: <strong id="checkOutText">선택 전</strong><br />
          숙박일수: <strong id="nightText">0박</strong>
        </div>

        <label for="room">객실</label>
        <select id="room">
          <option value="A룸">A룸</option>
          <option value="B룸">B룸</option>
        </select>

        <label for="name">예약자 이름</label>
        <input id="name" type="text" placeholder="홍길동" />

        <label for="phone">연락처</label>
        <input id="phone" type="tel" placeholder="010-0000-0000" />

        <label for="guests">인원</label>
        <input id="guests" type="number" min="1" value="1" />

        <label for="note">요청사항</label>
        <textarea id="note" placeholder="도착 예정 시간, 요청사항 등을 적어주세요."></textarea>

        <button class="submit-btn" id="submitBtn">예약하기</button>

        <div class="notice">
          예약 완료 후 Google Sheets에 저장됩니다.<br />
          같은 객실의 날짜가 겹치면 예약이 불가능합니다.
        </div>
      </div>
    </section>
  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw9Zw_wsTiazbYQQLorrP1B-YI81Q1rfzTjV_8_BlxKZ0nxa_RmoJgNRTH8UXAxB-PwSw/exec";

    const calendarEl = document.getElementById("calendar");
    const monthTitleEl = document.getElementById("monthTitle");

    const checkInText = document.getElementById("checkInText");
    const checkOutText = document.getElementById("checkOutText");
    const nightText = document.getElementById("nightText");

    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const submitBtn = document.getElementById("submitBtn");

    let currentDate = new Date();
    let reservations = [];

    let checkIn = null;
    let checkOut = null;

    init();

    async function init() {
      await loadReservations();
      renderCalendar();
    }

    async function loadReservations() {
      try {
        const res = await fetch(`${API_URL}?action=getReservations`);
        const data = await res.json();

        if (data.success) {
          reservations = data.reservations.filter(item => item.status !== "cancelled");
        }
      } catch (error) {
        alert("예약 데이터를 불러오지 못했습니다. Apps Script URL을 확인해주세요.");
      }
    }

    function renderCalendar() {
      calendarEl.innerHTML = "";

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      monthTitleEl.textContent = `${year}년 ${month + 1}월`;

      const firstDay = new Date(year, month, 1);
      const lastDate = new Date(year, month + 1, 0).getDate();
      const startDay = firstDay.getDay();

      for (let i = 0; i < startDay; i++) {
        const empty = document.createElement("div");
        calendarEl.appendChild(empty);
      }

      for (let date = 1; date <= lastDate; date++) {
        const cellDate = new Date(year, month, date);
        const dateStr = toDateString(cellDate);

        const dayEl = document.createElement("div");
        dayEl.className = "day";

        if (isPastDate(cellDate)) {
          dayEl.classList.add("disabled");
        }

        if (dateStr === checkIn || dateStr === checkOut || isBetweenSelected(dateStr)) {
          dayEl.classList.add("selected");
        }

        const aBooked = isRoomBooked("A룸", dateStr);
        const bBooked = isRoomBooked("B룸", dateStr);

        dayEl.innerHTML = `
          <div class="date-num">${date}</div>
          <div class="room-status">
            <span class="badge ${aBooked ? "booked" : ""}">
              A룸 ${aBooked ? "예약됨" : "가능"}
            </span>
            <span class="badge ${bBooked ? "booked" : ""}">
              B룸 ${bBooked ? "예약됨" : "가능"}
            </span>
          </div>
        `;

        dayEl.addEventListener("click", () => {
          if (isPastDate(cellDate)) return;
          selectDate(dateStr);
        });

        calendarEl.appendChild(dayEl);
      }
    }

    function selectDate(dateStr) {
      if (!checkIn || checkOut) {
        checkIn = dateStr;
        checkOut = null;
      } else {
        if (new Date(dateStr) <= new Date(checkIn)) {
          checkIn = dateStr;
          checkOut = null;
        } else {
          checkOut = dateStr;
        }
      }

      updateSummary();
      renderCalendar();
    }

    function updateSummary() {
      checkInText.textContent = checkIn || "선택 전";
      checkOutText.textContent = checkOut || "선택 전";

      if (checkIn && checkOut) {
        const nights = getNights(checkIn, checkOut);
        nightText.textContent = `${nights}박`;
      } else {
        nightText.textContent = "0박";
      }
    }

    function isRoomBooked(room, dateStr) {
      return reservations.some(item => {
        if (item.room !== room) return false;

        return (
          new Date(dateStr) >= new Date(item.checkIn) &&
          new Date(dateStr) < new Date(item.checkOut)
        );
      });
    }

    function isBetweenSelected(dateStr) {
      if (!checkIn || !checkOut) return false;

      return (
        new Date(dateStr) > new Date(checkIn) &&
        new Date(dateStr) < new Date(checkOut)
      );
    }

    function getNights(start, end) {
      const startDate = new Date(start);
      const endDate = new Date(end);
      const diff = endDate - startDate;

      return Math.round(diff / (1000 * 60 * 60 * 24));
    }

    function isPastDate(date) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      return date < today;
    }

    function toDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");

      return `${year}-${month}-${day}`;
    }

    prevBtn.addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });

    nextBtn.addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    submitBtn.addEventListener("click", async () => {
      const room = document.getElementById("room").value;
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const guests = document.getElementById("guests").value;
      const note = document.getElementById("note").value.trim();

      if (!checkIn || !checkOut) {
        alert("체크인과 체크아웃 날짜를 선택해주세요.");
        return;
      }

      if (!name || !phone || !guests) {
        alert("예약자 이름, 연락처, 인원을 입력해주세요.");
        return;
      }

      const hasConflict = hasDateConflict(room, checkIn, checkOut);

      if (hasConflict) {
        alert(`${room}은 선택한 날짜에 이미 예약이 있습니다.`);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "예약 중...";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "createReservation",
            room,
            checkIn,
            checkOut,
            name,
            phone,
            guests,
            note
          })
        });

        const data = await res.json();

        if (!data.success) {
          alert(data.message);
          return;
        }

        alert("예약이 완료되었습니다.");

        checkIn = null;
        checkOut = null;

        document.getElementById("name").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("guests").value = "1";
        document.getElementById("note").value = "";

        updateSummary();
        await loadReservations();
        renderCalendar();

      } catch (error) {
        alert("예약 저장에 실패했습니다. Apps Script 배포 설정을 확인해주세요.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "예약하기";
      }
    });

    function hasDateConflict(room, start, end) {
      return reservations.some(item => {
        if (item.room !== room) return false;

        return (
          new Date(start) < new Date(item.checkOut) &&
          new Date(end) > new Date(item.checkIn)
        );
      });
    }
  </script>
</body>
</html>
